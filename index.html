<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Aurora</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <nav>
    <div class="logo">Aurora</div>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#features">Features</a></li>
      <li><a href="#about">About</a></li>
      <li><button class="cta-button">Get Started</button></li>
    </ul>
  </nav>

  <main id="home" class="hero">
    <div class="hero-content">
      <h1 class="hero-title">Experience the <span class="highlight">Future</span></h1>
      <p class="hero-subtitle">Elevate your digital presence with stunning, responsive, and dynamic web experiences crafted with perfection.</p>
      <div class="hero-actions">
        <button class="primary-btn">Start your journey</button>
        <button class="secondary-btn">Learn more</button>
      </div>
    </div>
    
    <div class="glass-card">
      <div class="card-header">
        <div class="dots">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
      </div>
      <div class="card-body">
        <pre><code><span class="keyword">function</span> <span class="function">innovate</span>() {
  <span class="keyword">return</span> <span class="string">"Create beautiful things"</span>;
}

<span class="function">innovate</span>(); <span class="comment">// The sky is the limit</span></code></pre>
      </div>
    </div>
  </main>
</body>
</html>
